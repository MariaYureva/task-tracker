openapi: 3.0.1
info:
  title: Task Tracker API
  version: v1
  description: API трекера рабочих задач для МИС.
servers:
  - url: http://localhost:3000
components:
  parameters:
    UserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: integer
      description: Идентификатор текущего пользователя.
  schemas:
    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        system:
          type: boolean
    Occurrence:
      type: object
      properties:
        id:
          type: string
        task_id:
          type: integer
        title:
          type: string
        date:
          type: string
          format: date
        original_date:
          type: string
          format: date
        status:
          type: string
        exception:
          type: boolean
paths:
  /api/v1/users:
    get:
      summary: Список пользователей
      responses:
        '200':
          description: OK
    post:
      summary: Создать пользователя
      responses:
        '201':
          description: Created
  /api/v1/tags:
    get:
      summary: Список тегов
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
    post:
      summary: Создать пользовательский тег
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Created
  /api/v1/tags/{id}:
    patch:
      summary: Переименовать тег (системные защищены)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '403':
          description: Системный тег нельзя менять
    delete:
      summary: Удалить тег (системные защищены)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No Content
        '403':
          description: Системный тег нельзя удалить
  /api/v1/tasks:
    get:
      summary: Список серий задач
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: state
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Создать задачу/серию
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '201':
          description: Created
  /api/v1/tasks/{id}:
    get:
      summary: Серия
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
        '404':
          description: Not Found
    patch:
      summary: Изменить серию (scope all / only_this / this_and_future)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: scope
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Изменена
        '201':
          description: Создана новая серия
        '409':
          description: Конфликт блокировки
    delete:
      summary: Архивировать или удалить (?hard=true)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: hard
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Архивирована
        '204':
          description: Удалена
  /api/v1/tasks/{task_id}/tags:
    post:
      summary: Привязать тег к задаче
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: Created
  /api/v1/tasks/{task_id}/tags/{id}:
    delete:
      summary: Отвязать тег от задачи
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /api/v1/tasks/{task_id}/occurrences/{original_date}:
    patch:
      summary: Изменить экземпляр (статус / перенос / переопределение)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
        - name: original_date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
        '400':
          description: Дата не является вхождением серии
        '409':
          description: На целевую дату уже есть вхождение
        '422':
          description: Недопустимый статус
    delete:
      summary: Вернуть экземпляр под правило
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
        - name: original_date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        '204':
          description: No Content
        '404':
          description: Исключение не найдено
  /api/v1/occurrences:
    get:
      summary: Календарь вхождений за окно (обязательное, до 366 дней)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: tag_id
          in: query
          schema:
            type: integer
        - name: include_cancelled
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: OK
        '400':
          description: Окно не задано или превышает лимит